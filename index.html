// MOTEUR
// ═══════════════════════════════════════════
let currentPage=0, isPlaying=false, speed=1, queue=[], queueIdx=0;
const langCodes={fr:'fr-FR',es:'es-ES',en:'en-GB'};
const langFlags={fr:'🇫🇷',es:'🇪🇸',en:'🇬🇧'};
const langLabels={fr:'Français',es:'Español',en:'English'};

function init(){
  document.getElementById('totalPagesNum').textContent=pages.length;
  buildDots(); loadPage(0);
}

function buildDots(){
  const c=document.getElementById('pageDots'); c.innerHTML='';
  pages.forEach((_,i)=>{ const d=document.createElement('div'); d.className='dot'+(i===0?' current':''); d.id='dot-'+i; c.appendChild(d); });
}

function loadPage(idx){
  stopSpeech(); currentPage=idx; queueIdx=0; queue=[];
  document.getElementById('currentPageNum').textContent=idx+1;
  document.getElementById('langStatus').textContent='Appuie sur ▶ / Pulsa ▶ / Press ▶';
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('btnPrev').disabled=idx===0;
  document.getElementById('btnNext').disabled=idx===pages.length-1;
  const wtf=document.getElementById('wtfBadge'); wtf.textContent=''; wtf.classList.remove('visible');
  const blocksEl=document.getElementById('contentBlocks'); blocksEl.innerHTML='';

  pages[idx].forEach((block,bi)=>{
    if(block.type==='sound'){
      const el=document.createElement('div'); el.className='block-sound'; el.id='block-'+bi;
      el.innerHTML=`<div class="sound-text">${block.text}</div>`;
      blocksEl.appendChild(el);
      queue.push({text:block.text,lang:null,blockIdx:bi,lineId:null});
    } else {
      const isBubble=block.type==='bubble';
      const el=document.createElement('div');
      el.className=isBubble?'block-bubble':'block-narrative'; el.id='block-'+bi;
      const icon=isBubble?'💬':'📖';
      const lbl=block.label||( isBubble?'Bulle':'Narrateur');
      el.innerHTML=`<div class="block-type">${icon} ${lbl}</div>`+buildLines(block,bi);
      blocksEl.appendChild(el);
      ['fr','es','en'].forEach(lang=>{ if(block[lang]) queue.push({text:block[lang],lang,blockIdx:bi,lineId:`line-${bi}-${lang}`}); });
    }
  });

  document.querySelectorAll('.dot').forEach((d,i)=>{ d.className='dot'+(i===idx?' current':(i<idx?' done':'')); });
}

function buildLines(block,bi){
  return ['fr','es','en'].map(lang=>
    `<div class="lang-line" id="line-${bi}-${lang}"><span class="lang-flag">${langFlags[lang]}</span><span class="lang-text-inline">${block[lang]||''}</span></div>`
  ).join('');
}

function togglePlay(){ if(isPlaying) stopSpeech(); else playNext(); }

function playNext(){
  if(queueIdx>=queue.length){onComplete();return;}
  const item=queue[queueIdx];
  clearHL();
  document.querySelectorAll('.block-bubble').forEach(b=>b.classList.remove('active'));
  const bel=document.getElementById('block-'+item.blockIdx); if(bel) bel.classList.add('active');
  if(item.lineId){const l=document.getElementById(item.lineId);if(l)l.classList.add('speaking');}
  document.getElementById('progressFill').style.width=(queueIdx/queue.length*100)+'%';
  document.getElementById('langStatus').textContent=item.lang?langFlags[item.lang]+' '+langLabels[item.lang]+'…':'🔊 En cours…';
  const utt=new SpeechSynthesisUtterance(item.text);
  utt.lang=item.lang?langCodes[item.lang]:'fr-FR'; utt.rate=speed;
  utt.onend=()=>{ queueIdx++; if(isPlaying) setTimeout(playNext,item.lang==='en'?700:350); };
  utt.onerror=()=>{ queueIdx++; if(isPlaying) playNext(); };
  isPlaying=true; updateBtn(true); window.speechSynthesis.speak(utt);
}

function stopSpeech(){ isPlaying=false; window.speechSynthesis.cancel(); updateBtn(false); document.getElementById('langStatus').textContent='En pause / En pausa / Paused'; clearHL(); }
function onComplete(){ isPlaying=false; updateBtn(false); clearHL(); document.getElementById('progressFill').style.width='100%'; document.getElementById('langStatus').textContent='✓ Terminé / Terminado / Done!'; const w=document.getElementById('wtfBadge'); w.textContent=currentPage===pages.length-1?'WHAT THE FUN ! 🎉':''; w.classList.add('visible'); }
function clearHL(){ document.querySelectorAll('.lang-line').forEach(l=>l.classList.remove('speaking')); document.querySelectorAll('.block-bubble').forEach(b=>b.classList.remove('active')); }
function updateBtn(p){ const b=document.getElementById('btnPlay'); b.textContent=p?'⏸':'▶'; b.classList.toggle('playing',p); }
function prevPage(){ if(currentPage>0) loadPage(currentPage-1); }
function nextPage(){ if(currentPage<pages.length-1) loadPage(currentPage+1); }
function setSpeed(s,btn){ speed=s; document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); if(isPlaying){stopSpeech();playNext();} }

init();
</script>
